<!DOCTYPE html>
<html>
<head>
    <title>Fabry Prediction</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 50px; }
        input, select { padding: 10px; margin: 10px; width: 250px; }
        button { padding: 10px 20px; background-color: blue; color: white; border: none; }
    </style>
</head>
<body>

<h2>Fabry Disease Prediction</h2>

<form action="/predict" method="post">
    <input type="number" name="age" placeholder="Age" required><br>

    <select name="sex">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select><br>

    <input type="text" name="symptoms" placeholder="Enter symptoms"><br>

    <button type="submit">Predict</button>
</form>

<h3>{{ prediction_text }}</h3>

</body>
</html>
